    <text x="114" y="290" fill="#17201c" font-size="34" font-weight="700">2000+</text>
    <text x="114" y="322" fill="#5f6863" font-size="15">manual cases across 10 products</text>
    <rect x="343" y="222" width="214" height="128" fill="#ffffff" stroke="#d9d4c9"/>
    <text x="365" y="258" fill="#b75c35" font-size="15" font-weight="700">DEFECT CONTROL</text>
    <text x="365" y="290" fill="#17201c" font-size="34" font-weight="700">25-30%</text>
    <text x="365" y="322" fill="#5f6863" font-size="15">lower defect escape rate</text>
    <rect x="594" y="222" width="214" height="128" fill="#ffffff" stroke="#d9d4c9"/>
    <text x="616" y="258" fill="#b75c35" font-size="15" font-weight="700">AI WORKFLOWS</text>
    <text x="616" y="290" fill="#17201c" font-size="34" font-weight="700">AI</text>
    <text x="616" y="322" fill="#5f6863" font-size="15">prompt, output, and workflow QA</text>
  </g>
