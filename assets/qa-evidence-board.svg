<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-labelledby="title desc">
  <title id="title">Manual QA evidence board</title>
  <desc id="desc">A structured QA board showing test coverage, defect triage, mobile checks, API validation, and AI workflow review.</desc>
  <rect width="900" height="640" fill="#17201c"/>
  <path d="M0 0h900v640H0z" fill="#17201c"/>
  <g opacity=".14" stroke="#f8f5ef" stroke-width="1">
    <path d="M80 0v640M180 0v640M280 0v640M380 0v640M480 0v640M580 0v640M680 0v640M780 0v640"/>
    <path d="M0 80h900M0 180h900M0 280h900M0 380h900M0 480h900M0 580h900"/>
  </g>
  <rect x="58" y="58" width="784" height="524" fill="#f8f5ef" rx="18"/>
  <rect x="92" y="94" width="716" height="88" fill="#1f6f54" rx="14"/>
  <text x="126" y="132" fill="#ffffff" font-family="Trebuchet MS, Verdana, sans-serif" font-size="22" font-weight="700">QA Engineer Evidence Board</text>
  <text x="126" y="160" fill="#d6eadf" font-family="Trebuchet MS, Verdana, sans-serif" font-size="16">Resume-backed coverage across SaaS, AI, mobile, API, payments, and security testing</text>
  <g font-family="Trebuchet MS, Verdana, sans-serif">
